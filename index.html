<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Айгиза ❤️</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink: #ff4f8b;
      --pink-soft: #ff8fb4;
      --bg: #05060a;
      --white: #ffffff;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--white);
    }

    body {
      position: relative;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(circle at center, #0b1020 0%, #05060a 60%, #020308 100%);
    }

    .floating-hearts {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      bottom: -40px;
      color: rgba(255, 90, 140, 0.8);
      animation: floatUp linear forwards;
      user-select: none;
      text-shadow: 0 0 10px rgba(255, 80, 120, 0.35);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8) rotate(0deg);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.4) rotate(25deg);
        opacity: 0;
      }
    }

    .scene {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    .scene.active {
      display: flex;
    }

    .title-big {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 0 0 18px rgba(255,255,255,0.25);
      animation: fadeInScale 1s ease both;
    }

    .title-mid {
      font-size: 32px;
      font-weight: 700;
      text-shadow: 0 0 16px rgba(255,255,255,0.2);
      animation: fadeInScale 1s ease both;
    }

    .big-heart {
      font-size: 90px;
      animation: pulse 1.1s infinite;
      filter: drop-shadow(0 0 18px rgba(255, 80, 130, 0.45));
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(12px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* BOOK */
    .book-wrap {
      perspective: 1600px;
      width: 92vw;
      max-width: 420px;
      height: 62vh;
      max-height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .page {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.96);
      border-radius: 16px;
      box-shadow:
        0 12px 40px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .page-inner {
      width: 100%;
      height: 100%;
      padding: 18px 14px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      color: #222;
    }

    .page-text {
      font-size: 18px;
      font-weight: 600;
      color: #8f5571;
      text-align: center;
      min-height: 32px;
    }

    .page-photos {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
      justify-items: center;
    }

    .page-photos img {
      width: 100%;
      height: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .cover {
      z-index: 5;
      background:
        linear-gradient(135deg, rgba(255,110,170,0.18), rgba(255,255,255,0.95)),
        #fff;
      transform-origin: left center;
      transition: transform 1.6s ease;
    }

    .cover.open {
      transform: rotateY(-160deg);
    }

    .right-page {
      z-index: 3;
      transform-origin: left center;
      transition: transform 1.5s ease;
    }

    .right-page.flip {
      transform: rotateY(-180deg);
    }

    .left-static {
      z-index: 1;
    }

    /* FINAL HEART */
    .final-heart-wrap {
      position: relative;
      width: min(92vw, 380px);
      height: min(92vw, 340px);
      margin-top: 12px;
    }

    .heart-piece {
      position: absolute;
      width: 58px;
      height: 58px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(0,0,0,0.28);
      opacity: 0;
      transform: translate(var(--sx), var(--sy)) scale(0.35) rotate(var(--rot));
      animation: flyToHeart 1.6s cubic-bezier(.2,.8,.2,1) forwards;
      animation-delay: var(--delay);
    }

    @keyframes flyToHeart {
      0% {
        opacity: 0;
        transform: translate(var(--sx), var(--sy)) scale(0.35) rotate(var(--rot));
      }
      18% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
    }

    .final-label {
      margin-top: 14px;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 0 14px rgba(255,255,255,0.18);
      animation: fadeInScale 1s ease both;
      animation-delay: 1.4s;
    }

    .tap-hint {
      position: absolute;
      bottom: 30px;
      font-size: 14px;
      opacity: 0.75;
      letter-spacing: 0.4px;
    }

    .music-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 14px;
      background: rgba(255,255,255,0.1);
      color: white;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 390px) {
      .title-big { font-size: 36px; }
      .title-mid { font-size: 28px; }
      .big-heart { font-size: 78px; }
      .heart-piece {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="floating-hearts" id="floatingHearts"></div>

  <button class="music-btn" id="musicBtn">Включить музыку</button>

  <audio id="bgMusic" loop playsinline>
    <source src="music.mp3.mp3" type="audio/mpeg">
  </audio>

  <section class="scene active" id="scene1">
    <div class="title-big">Happy 8 March</div>
  </section>

  <section class="scene" id="scene2">
    <div class="big-heart">❤️</div>
  </section>

  <section class="scene" id="scene3">
    <div class="title-mid">С 8 марта матурым ❤️</div>
  </section>

  <section class="scene" id="scene4">
    <div class="book-wrap">
      <div class="book" id="book">
        <div class="page left-static">
          <div class="page-inner">
            <div class="page-text">Для тебя 💗</div>
            <div class="page-photos">
              <img src="1.jpg" alt="">
              <img src="2.jpg" alt="">
            </div>
          </div>
        </div>

        <div class="page right-page" id="rightPage">
          <div class="page-inner">
            <div class="page-text">Ты очень красивая ✨</div>
            <div class="page-photos">
              <img src="3.jpg" alt="">
              <img src="4.jpg" alt="">
            </div>
          </div>
        </div>

        <div class="page cover" id="cover">
          <div class="page-inner">
            <div class="page-text">Открой подарок 💌</div>
            <div class="page-photos">
              <img src="5.jpg" alt="">
              <img src="6.jpg" alt="">
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="tap-hint">листай...</div>
  </section>

  <section class="scene" id="scene5">
    <div class="final-heart-wrap" id="heartWrap"></div>
    <div class="final-label">Айгиза ❤️</div>
  </section>

  <script>
    const scenes = [
      document.getElementById('scene1'),
      document.getElementById('scene2'),
      document.getElementById('scene3'),
      document.getElementById('scene4'),
      document.getElementById('scene5')
    ];

    function showScene(index) {
      scenes.forEach((s, i) => s.classList.toggle('active', i === index));
    }

    // Timeline
    setTimeout(() => showScene(1), 2500);
    setTimeout(() => showScene(2), 5000);
    setTimeout(() => showScene(3), 8000);

    // Book animation
    const cover = document.getElementById('cover');
    const rightPage = document.getElementById('rightPage');

    setTimeout(() => {
      cover.classList.add('open');
    }, 9000);

    setTimeout(() => {
      rightPage.classList.add('flip');
    }, 11200);

    setTimeout(() => {
      showScene(4);
      buildHeart();
    }, 14500);

    // Stars
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let w, h, stars;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      stars = Array.from({ length: 140 }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.8 + 0.2,
        s: Math.random() * 0.35 + 0.08
      }));
    }

    function drawStars() {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#fff';

      for (const star of stars) {
        ctx.globalAlpha = 0.6 + Math.random() * 0.4;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();

        star.y += star.s;
        if (star.y > h) {
          star.y = -5;
          star.x = Math.random() * w;
        }
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(drawStars);
    }

    resize();
    drawStars();
    window.addEventListener('resize', resize);

    // Floating hearts
    const floatingHearts = document.getElementById('floatingHearts');

    function spawnHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (14 + Math.random() * 22) + 'px';
      heart.style.animationDuration = (6 + Math.random() * 5) + 's';
      heart.style.opacity = (0.35 + Math.random() * 0.5).toFixed(2);
      floatingHearts.appendChild(heart);

      setTimeout(() => heart.remove(), 12000);
    }

    setInterval(spawnHeart, 650);
    for (let i = 0; i < 8; i++) {
      setTimeout(spawnHeart, i * 300);
    }

    // Final photo heart
    function buildHeart() {
      const wrap = document.getElementById('heartWrap');
      const photos = [
        '1.jpg','2.jpg','3.jpg','4.jpg','5.jpg',
        '6.jpg','7.jpg','8.jpg','9.jpg','10.jpg',
        '11.jpg','12.jpg','13.jpg','14.jpg','15.jpg',
        '16.jpg','17.jpg','18.jpg','19.jpg','20.jpg'
      ];

      const positions = [
        [160, 10],
        [100, 35], [220, 35],
        [60, 80], [130, 70], [190, 70], [260, 80],
        [35, 135], [95, 130], [155, 122], [215, 130], [275, 135],
        [60, 195], [120, 205], [180, 205], [240, 195],
        [95, 255], [145, 275], [195, 275], [145, 315]
      ];

      wrap.innerHTML = '';

      photos.forEach((src, i) => {
        const img = document.createElement('img');
        img.src = src;
        img.className = 'heart-piece';

        const [x, y] = positions[i];
        img.style.left = x + 'px';
        img.style.top = y + 'px';

        img.style.setProperty('--sx', (Math.random() * 420 - 210) + 'px');
        img.style.setProperty('--sy', (Math.random() * 700 - 350) + 'px');
        img.style.setProperty('--rot', (Math.random() * 240 - 120) + 'deg');
        img.style.setProperty('--delay', (i * 0.12) + 's');

        wrap.appendChild(img);
      });
    }

    // Music
    const music = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');

    async function tryPlayMusic() {
      try {
        await music.play();
        musicBtn.style.display = 'none';
      } catch (e) {
        musicBtn.style.display = 'block';
      }
    }

    musicBtn.addEventListener('click', async () => {
      try {
        await music.play();
        musicBtn.style.display = 'none';
      } catch (e) {}
    });

    document.body.addEventListener('click', tryPlayMusic, { once: true });
    window.addEventListener('load', tryPlayMusic);
  </script>
</body>
</html>
